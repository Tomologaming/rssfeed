name: RSS-Feeds bauen
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node build.mjs
        env:
          NOTION_TOKEN: __SECRET__
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add feeds
          git commit -m "Feeds aktualisiert" || echo "keine Aenderung"
          git push
